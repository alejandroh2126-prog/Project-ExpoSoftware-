<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Iniciar Sesión – Guía Emprendedor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="css/styles.css"/>
</head>
<body class="auth-page">
<div class="auth-container">
    <div class="auth-brand">
        <span class="brand-dot"></span>
        <span>Guía Emprendedor</span>
        <span class="brand-tag">POO – UPC</span>
    </div>
    <div class="auth-card">
        <h1>Bienvenido de nuevo</h1>
        <p class="auth-sub">Inicia sesión para acceder a tu guía personalizada</p>
        <div id="error-msg" class="alert alert-error" style="display:none"></div>
        <div class="form-group">
            <label>Correo electrónico</label>
            <input type="email" id="email" placeholder="tucorreo@email.com"/>
        </div>
        <div class="form-group">
            <label>Contraseña</label>
            <input type="password" id="password" placeholder="Tu contraseña"/>
        </div>
        <button class="btn btn-primary btn-full" id="btnLogin">Iniciar sesión</button>
        <p class="auth-switch">¿No tienes cuenta? <a href="registro.html">Regístrate gratis</a></p>
    </div>
    <p class="auth-footer">© 2026 Alejandro Henríquez Quinchia · Universidad Popular del Cesar</p>
</div>
<script src="../js/auth.js"></script>  <!-- si sigue en html/ -->
</body>
</html>

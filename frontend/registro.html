<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Registro – Guía Emprendedor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="css/styles.css"/>
</head>
<body class="auth-page">
<div class="auth-container">
    <div class="auth-brand">
        <span class="brand-dot"></span>
        <span>Guía Emprendedor</span>
        <span class="brand-tag">POO – UPC</span>
    </div>
    <div class="auth-card">
        <h1>Crea tu cuenta</h1>
        <p class="auth-sub">Empieza a gestionar tus emprendimientos hoy</p>
        <div id="error-msg" class="alert alert-error" style="display:none"></div>
        <div id="success-msg" class="alert alert-success" style="display:none"></div>
        <div class="form-group">
            <label>Nombre completo</label>
            <input type="text" id="nombre" placeholder="Tu nombre completo"/>
        </div>
        <div class="form-group">
            <label>Correo electrónico</label>
            <input type="email" id="email" placeholder="tucorreo@email.com"/>
        </div>
        <div class="form-group">
            <label>Contraseña</label>
            <input type="password" id="password" placeholder="Mínimo 6 caracteres"/>
        </div>
        <div class="form-group">
            <label>Confirmar contraseña</label>
            <input type="password" id="password2" placeholder="Repite tu contraseña"/>
        </div>
        <button class="btn btn-primary btn-full" id="btnRegistro">Crear cuenta</button>
        <p class="auth-switch">¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
    </div>
    <p class="auth-footer">© 2024 Alejandro Henríquez Quinchia · Universidad Popular del Cesar</p>
</div>
<script src="js/auth.js"></script>
</body>
</html>
